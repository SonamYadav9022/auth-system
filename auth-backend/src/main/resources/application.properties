spring.application.name=authsystem

# H2 Database
spring.datasource.url=jdbc:h2:mem:authdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT
# Set JWT_SECRET as an environment variable in real deployments.
# The value below is only a local-dev fallback so the app still runs out of the box.
jwt.secret=${JWT_SECRET:5VfmR1fEFApjFi5vYr1w/FjU3u31CC41oKaLHPgHMSxjrKKU4Yg+aHMzht7o0bm/RNFaU6oCiQ1icDO1r3patg==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html